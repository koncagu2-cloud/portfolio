<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex" />
    <title>Redirecting…</title>
    <script>
      // GitHub Pages SPA fallback: send missing routes through ?/ so React Router can read them.
      // segmentCount 0 = site at domain root (custom domain or user site). Use 1 for project pages like /portfolio/.
      ;(function () {
        var l = window.location
        var segmentCount = 0
        var path = l.pathname.split('/').slice(0, 1 + segmentCount).join('/') + '/'
        var rest = l.pathname.replace(path, '')
        var redirect = path + '?/' + rest + (l.search ? '&' + l.search.slice(1) : '') + l.hash
        l.replace(redirect)
      })()
    </script>
  </head>
  <body></body>
</html>
