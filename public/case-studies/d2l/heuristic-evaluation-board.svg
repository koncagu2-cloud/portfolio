<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">D2L heuristic evaluation board</title>
  <desc id="desc">A readable research artifact summarizing heuristic evaluation findings for the D2L redesign.</desc>
  <rect width="1600" height="900" fill="#f7faf8"/>
  <rect x="64" y="60" width="1472" height="780" rx="34" fill="#ffffff" stroke="#d9e5df" stroke-width="3"/>
  <text x="110" y="132" font-family="Inter, Arial, sans-serif" font-size="42" font-weight="800" fill="#123f35">Heuristic evaluation synthesis</text>
  <text x="110" y="180" font-family="Inter, Arial, sans-serif" font-size="22" fill="#54736a">D2L / Brightspace audit themes that shaped the student prototype</text>
  <g font-family="Inter, Arial, sans-serif">
    <rect x="110" y="230" width="420" height="520" rx="24" fill="#eef7f3" stroke="#c8ded5"/>
    <text x="144" y="286" font-size="28" font-weight="800" fill="#123f35">Navigation visibility</text>
    <text x="144" y="340" font-size="22" fill="#294c43">Problem</text>
    <text x="144" y="376" font-size="22" fill="#335e53">Students could lose their place between course pages, assignments, and resources.</text>
    <text x="144" y="470" font-size="22" fill="#294c43">Design response</text>
    <text x="144" y="506" font-size="22" fill="#335e53">Use persistent navigation, clearer active states, and stronger page headers.</text>
    <rect x="144" y="624" width="240" height="54" rx="27" fill="#18453b"/>
    <text x="174" y="660" font-size="20" fill="#ffffff">Visibility of status</text>
    <rect x="590" y="230" width="420" height="520" rx="24" fill="#f4f8ff" stroke="#d4e1f8"/>
    <text x="624" y="286" font-size="28" font-weight="800" fill="#123f35">Information hierarchy</text>
    <text x="624" y="340" font-size="22" fill="#294c43">Problem</text>
    <text x="624" y="376" font-size="22" fill="#335e53">Important assignment and calendar information competed with secondary content.</text>
    <text x="624" y="470" font-size="22" fill="#294c43">Design response</text>
    <text x="624" y="506" font-size="22" fill="#335e53">Prioritize announcements, due dates, and submission actions in the first scan.</text>
    <rect x="624" y="624" width="230" height="54" rx="27" fill="#0b9a6d"/>
    <text x="654" y="660" font-size="20" fill="#ffffff">Recognition over recall</text>
    <rect x="1070" y="230" width="420" height="520" rx="24" fill="#fff7ee" stroke="#ead8c2"/>
    <text x="1104" y="286" font-size="28" font-weight="800" fill="#123f35">User control</text>
    <text x="1104" y="340" font-size="22" fill="#294c43">Problem</text>
    <text x="1104" y="376" font-size="22" fill="#335e53">Upload tasks created uncertainty around selected files, submission status, and confirmation.</text>
    <text x="1104" y="470" font-size="22" fill="#294c43">Design response</text>
    <text x="1104" y="506" font-size="22" fill="#335e53">Keep upload steps focused and end with a clear confirmation state.</text>
    <rect x="1104" y="624" width="220" height="54" rx="27" fill="#2cc295"/>
    <text x="1134" y="660" font-size="20" fill="#ffffff">Feedback & recovery</text>
  </g>
</svg>
