<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1080" viewBox="0 0 1920 1080" role="img" aria-labelledby="title desc">
  <title id="title">OceanGate Trust Journey Map</title>
  <desc id="desc">A slide-ready UX journey map showing stages, emotions, pain points, opportunities, and an emotional trust curve.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#07111f"/>
      <stop offset="0.54" stop-color="#0b1628"/>
      <stop offset="1" stop-color="#101827"/>
    </linearGradient>
    <linearGradient id="curve" x1="0" x2="1">
      <stop offset="0" stop-color="#67e8f9"/>
      <stop offset="0.45" stop-color="#fbbf24"/>
      <stop offset="1" stop-color="#f87171"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="22" flood-color="#000000" flood-opacity="0.28"/>
    </filter>
    <style>
      .title { font: 800 56px Arial, sans-serif; letter-spacing: -1.8px; fill: #f8fafc; }
      .eyebrow { font: 700 17px Arial, sans-serif; letter-spacing: 5px; text-transform: uppercase; fill: #8bdff0; opacity: .78; }
      .subtitle { font: 400 25px Arial, sans-serif; fill: #cbd5e1; opacity: .86; }
      .card-title { font: 800 21px Arial, sans-serif; fill: #f8fafc; }
      .card-label { font: 800 12px Arial, sans-serif; letter-spacing: 1.8px; fill: #93a4b8; }
      .card-text { font: 400 15.5px Arial, sans-serif; fill: #d8e2ee; }
      .small { font: 700 14px Arial, sans-serif; fill: #a9b8ca; }
      .curve-label { font: 800 15px Arial, sans-serif; letter-spacing: 2px; fill: #a7f3d0; }
      .emotion { font: 800 18px Arial, sans-serif; fill: #f8fafc; }
      .chip { font: 700 18px Arial, sans-serif; fill: #dffafe; }
      .note { font: 400 18px Arial, sans-serif; fill: #d8e2ee; }
    </style>
  </defs>

  <rect width="1920" height="1080" fill="url(#bg)"/>
  <circle cx="260" cy="40" r="320" fill="#0ea5e9" opacity=".12"/>
  <circle cx="1660" cy="130" r="360" fill="#f97316" opacity=".11"/>
  <circle cx="1160" cy="1060" r="440" fill="#14b8a6" opacity=".08"/>

  <g transform="translate(70 58)">
    <text class="eyebrow" x="0" y="0">Slide 4 / UX Journey Artifact</text>
    <text class="title" x="0" y="72">OceanGate Trust Journey Map</text>
    <text class="subtitle" x="0" y="118">How aspiration, credibility cues, and unclear risk communication shaped trust before collapse.</text>
  </g>

  <g transform="translate(70 185)" filter="url(#softShadow)">
    <g>
      <rect x="0" y="0" width="240" height="448" rx="24" fill="#101b2d" stroke="#28445a"/>
      <rect x="0" y="0" width="240" height="10" rx="5" fill="#67e8f9"/>
      <circle cx="35" cy="48" r="22" fill="#67e8f9" opacity=".18"/>
      <text class="small" x="28" y="54">01</text>
      <text class="card-title" x="24" y="96">Discovers</text>
      <text class="card-title" x="24" y="122">OceanGate</text>
      <text class="card-label" x="24" y="164">ACTIONS</text>
      <text class="card-text" x="24" y="188">Finds OceanGate through</text>
      <text class="card-text" x="24" y="210">media, branding, or word</text>
      <text class="card-text" x="24" y="232">of mouth.</text>
      <text class="card-label" x="24" y="268">TOUCHPOINTS</text>
      <text class="card-text" x="24" y="292">Website, promo content,</text>
      <text class="card-text" x="24" y="314">interviews, media coverage.</text>
      <text class="card-label" x="24" y="350">EMOTION</text>
      <text class="card-text" x="24" y="374">Curious, impressed, excited.</text>
      <text class="card-label" x="24" y="410">OPPORTUNITY</text>
      <text class="card-text" x="24" y="434">Safety as visible as branding.</text>
    </g>

    <g transform="translate(255 0)">
      <rect x="0" y="0" width="240" height="448" rx="24" fill="#101b2d" stroke="#28445a"/>
      <rect x="0" y="0" width="240" height="10" rx="5" fill="#38bdf8"/>
      <circle cx="35" cy="48" r="22" fill="#38bdf8" opacity=".18"/>
      <text class="small" x="28" y="54">02</text>
      <text class="card-title" x="24" y="96">Researches</text>
      <text class="card-title" x="24" y="122">Experience</text>
      <text class="card-label" x="24" y="164">ACTIONS</text>
      <text class="card-text" x="24" y="188">Looks into the expedition,</text>
      <text class="card-text" x="24" y="210">Titanic dive details, cost,</text>
      <text class="card-text" x="24" y="232">and company credibility.</text>
      <text class="card-label" x="24" y="268">PAIN POINT</text>
      <text class="card-text" x="24" y="292">A non-expert cannot easily</text>
      <text class="card-text" x="24" y="314">judge technical legitimacy.</text>
      <text class="card-label" x="24" y="350">EMOTION</text>
      <text class="card-text" x="24" y="374">Interested, cautious, unsure.</text>
      <text class="card-label" x="24" y="410">OPPORTUNITY</text>
      <text class="card-text" x="24" y="434">Plain-language safety proof.</text>
    </g>

    <g transform="translate(510 0)">
      <rect x="0" y="0" width="240" height="448" rx="24" fill="#101b2d" stroke="#28445a"/>
      <rect x="0" y="0" width="240" height="10" rx="5" fill="#5eead4"/>
      <circle cx="35" cy="48" r="22" fill="#5eead4" opacity=".18"/>
      <text class="small" x="28" y="54">03</text>
      <text class="card-title" x="24" y="96">Builds</text>
      <text class="card-title" x="24" y="122">Trust</text>
      <text class="card-label" x="24" y="164">ACTIONS</text>
      <text class="card-text" x="24" y="188">Begins believing OceanGate</text>
      <text class="card-text" x="24" y="210">is credible enough to</text>
      <text class="card-text" x="24" y="232">deliver safely.</text>
      <text class="card-label" x="24" y="268">TOUCHPOINTS</text>
      <text class="card-text" x="24" y="292">Founder messaging, prestige,</text>
      <text class="card-text" x="24" y="314">brand voice, consultation.</text>
      <text class="card-label" x="24" y="350">PAIN POINT</text>
      <text class="card-text" x="24" y="374">Trust shaped by confidence</text>
      <text class="card-text" x="24" y="396">more than evidence.</text>
      <text class="card-label" x="24" y="430">OPP: Transparency.</text>
    </g>

    <g transform="translate(765 0)">
      <rect x="0" y="0" width="240" height="448" rx="24" fill="#101b2d" stroke="#4a3d26"/>
      <rect x="0" y="0" width="240" height="10" rx="5" fill="#fbbf24"/>
      <circle cx="35" cy="48" r="22" fill="#fbbf24" opacity=".18"/>
      <text class="small" x="28" y="54">04</text>
      <text class="card-title" x="24" y="96">Signs On /</text>
      <text class="card-title" x="24" y="122">Prepares</text>
      <text class="card-label" x="24" y="164">ACTIONS</text>
      <text class="card-text" x="24" y="188">Signs documents, receives</text>
      <text class="card-text" x="24" y="210">onboarding info, prepares</text>
      <text class="card-text" x="24" y="232">for expedition.</text>
      <text class="card-label" x="24" y="268">TOUCHPOINTS</text>
      <text class="card-text" x="24" y="292">Waivers, communication,</text>
      <text class="card-text" x="24" y="314">pre-trip support.</text>
      <text class="card-label" x="24" y="350">PAIN POINT</text>
      <text class="card-text" x="24" y="374">Legal consent may not equal</text>
      <text class="card-text" x="24" y="396">informed understanding.</text>
      <text class="card-label" x="24" y="430">OPP: Better consent.</text>
    </g>

    <g transform="translate(1020 0)">
      <rect x="0" y="0" width="240" height="448" rx="24" fill="#101b2d" stroke="#5c3320"/>
      <rect x="0" y="0" width="240" height="10" rx="5" fill="#fb923c"/>
      <circle cx="35" cy="48" r="22" fill="#fb923c" opacity=".18"/>
      <text class="small" x="28" y="54">05</text>
      <text class="card-title" x="24" y="96">Crisis</text>
      <text class="card-title" x="24" y="122">Becomes Public</text>
      <text class="card-label" x="24" y="164">ACTIONS</text>
      <text class="card-text" x="24" y="188">Families, media, and public</text>
      <text class="card-text" x="24" y="210">follow the story after</text>
      <text class="card-text" x="24" y="232">contact is lost.</text>
      <text class="card-label" x="24" y="268">TOUCHPOINTS</text>
      <text class="card-text" x="24" y="292">News alerts, public statements,</text>
      <text class="card-text" x="24" y="314">social media, live coverage.</text>
      <text class="card-label" x="24" y="350">PAIN POINT</text>
      <text class="card-text" x="24" y="374">Information is fragmented</text>
      <text class="card-text" x="24" y="396">and overwhelming.</text>
      <text class="card-label" x="24" y="430">OPP: Humane crisis comms.</text>
    </g>

    <g transform="translate(1275 0)">
      <rect x="0" y="0" width="240" height="448" rx="24" fill="#101b2d" stroke="#5f2b2b"/>
      <rect x="0" y="0" width="240" height="10" rx="5" fill="#f87171"/>
      <circle cx="35" cy="48" r="22" fill="#f87171" opacity=".18"/>
      <text class="small" x="28" y="54">06</text>
      <text class="card-title" x="24" y="96">Trust</text>
      <text class="card-title" x="24" y="122">Collapses</text>
      <text class="card-label" x="24" y="164">ACTIONS</text>
      <text class="card-text" x="24" y="188">Public learns more about</text>
      <text class="card-text" x="24" y="210">safety concerns, warnings,</text>
      <text class="card-text" x="24" y="232">and organization issues.</text>
      <text class="card-label" x="24" y="268">TOUCHPOINTS</text>
      <text class="card-text" x="24" y="292">Investigations, experts,</text>
      <text class="card-text" x="24" y="314">reports, press coverage.</text>
      <text class="card-label" x="24" y="350">PAIN POINT</text>
      <text class="card-text" x="24" y="374">Credibility collapses because</text>
      <text class="card-text" x="24" y="396">trust lacked safety proof.</text>
      <text class="card-label" x="24" y="430">OPP: Third-party oversight.</text>
    </g>

    <g transform="translate(1530 0)">
      <rect x="0" y="0" width="240" height="448" rx="24" fill="#101b2d" stroke="#425164"/>
      <rect x="0" y="0" width="240" height="10" rx="5" fill="#cbd5e1"/>
      <circle cx="35" cy="48" r="22" fill="#cbd5e1" opacity=".18"/>
      <text class="small" x="28" y="54">07</text>
      <text class="card-title" x="24" y="96">Aftermath /</text>
      <text class="card-title" x="24" y="122">Reflection</text>
      <text class="card-label" x="24" y="164">ACTIONS</text>
      <text class="card-text" x="24" y="188">Public and regulators reflect</text>
      <text class="card-text" x="24" y="210">on what failed and what</text>
      <text class="card-text" x="24" y="232">should change.</text>
      <text class="card-label" x="24" y="268">TOUCHPOINTS</text>
      <text class="card-text" x="24" y="292">Investigations, discussion,</text>
      <text class="card-text" x="24" y="314">policy conversations.</text>
      <text class="card-label" x="24" y="350">PAIN POINT</text>
      <text class="card-text" x="24" y="374">Reveals deeper ethics,</text>
      <text class="card-text" x="24" y="396">oversight, and service gaps.</text>
      <text class="card-label" x="24" y="430">OPP: Safety-first design.</text>
    </g>
  </g>

  <g transform="translate(70 670)">
    <rect x="0" y="0" width="1168" height="232" rx="28" fill="#081422" stroke="#1e3a4d"/>
    <text class="curve-label" x="28" y="38">EMOTIONAL JOURNEY CURVE</text>
    <line x1="38" x2="1128" y1="78" y2="78" stroke="#ffffff" opacity=".08"/>
    <line x1="38" x2="1128" y1="128" y2="128" stroke="#ffffff" opacity=".08"/>
    <line x1="38" x2="1128" y1="178" y2="178" stroke="#ffffff" opacity=".08"/>
    <polyline points="60,72 228,98 396,78 564,104 732,168 900,194 1068,172" fill="none" stroke="url(#curve)" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
    <g fill="#ffffff">
      <circle cx="60" cy="72" r="10" fill="#67e8f9"/>
      <circle cx="228" cy="98" r="10" fill="#38bdf8"/>
      <circle cx="396" cy="78" r="10" fill="#5eead4"/>
      <circle cx="564" cy="104" r="10" fill="#fbbf24"/>
      <circle cx="732" cy="168" r="10" fill="#fb923c"/>
      <circle cx="900" cy="194" r="10" fill="#f87171"/>
      <circle cx="1068" cy="172" r="10" fill="#cbd5e1"/>
    </g>
    <text class="small" x="22" y="220">Discover high</text>
    <text class="small" x="180" y="220">Research med-high</text>
    <text class="small" x="370" y="220">Trust high</text>
    <text class="small" x="520" y="220">Signs on med-high</text>
    <text class="small" x="708" y="220">Crisis drop</text>
    <text class="small" x="850" y="220">Lowest</text>
    <text class="small" x="1010" y="220">Slight recovery</text>
  </g>

  <g transform="translate(1262 670)">
    <rect x="0" y="0" width="588" height="100" rx="26" fill="#0d1d30" stroke="#29465c"/>
    <text class="curve-label" x="28" y="36">EMOTIONAL LINE</text>
    <text class="emotion" x="28" y="68">excited > cautious > reassured > nervous</text>
    <text class="emotion" x="28" y="92">shocked > distrustful > skeptical</text>
  </g>

  <g transform="translate(1262 792)">
    <rect x="0" y="0" width="588" height="110" rx="26" fill="#0f2f36" stroke="#2dd4bf" opacity=".98"/>
    <text class="curve-label" x="28" y="38">KEY OPPORTUNITIES</text>
    <text class="chip" x="28" y="76">clearer risk communication  |  independent safety validation</text>
    <text class="chip" x="28" y="104">better consent  |  ethical trust-building  |  crisis communication</text>
  </g>
</svg>
